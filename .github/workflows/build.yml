name: Build SFML APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager "ndk;25.2.9519653"
          sdkmanager "cmake;3.22.1"

      - name: Download SFML 2.5.1 source
        run: |
          wget https://github.com/SFML/SFML/archive/refs/tags/2.5.1.zip
          unzip 2.5.1.zip
          mv SFML-2.5.1 SFML

      - name: Build SFML for arm64-v8a
        run: |
          export NDK=$ANDROID_SDK_ROOT/ndk/25.2.9519653
          mkdir -p SFML/build-arm64
          cd SFML/build-arm64
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSFML_BUILD_AUDIO=OFF \
            -DSFML_BUILD_NETWORK=OFF \
            -DSFML_BUILD_GRAPHICS=ON \
            -DSFML_USE_SYSTEM_DEPS=OFF \
            -DCMAKE_INSTALL_PREFIX=../../sfml-install/arm64-v8a
          make -j$(nproc)
          make install

      - name: Build SFML for x86_64
        run: |
          export NDK=$ANDROID_SDK_ROOT/ndk/25.2.9519653
          mkdir -p SFML/build-x86_64
          cd SFML/build-x86_64
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-26 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSFML_BUILD_AUDIO=OFF \
            -DSFML_BUILD_NETWORK=OFF \
            -DSFML_BUILD_GRAPHICS=ON \
            -DSFML_USE_SYSTEM_DEPS=OFF \
            -DCMAKE_INSTALL_PREFIX=../../sfml-install/x86_64
          make -j$(nproc)
          make install

      - name: Copy SFML libs to app
        run: |
          mkdir -p app/sfml/arm64-v8a
          mkdir -p app/sfml/x86_64
          cp -r sfml-install/arm64-v8a/* app/sfml/arm64-v8a/
          cp -r sfml-install/x86_64/* app/sfml/x86_64/

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sfml-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
