name: Build SFML APK v2

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager "ndk;25.2.9519653"
          sdkmanager "cmake;3.22.1"

      - name: Download sources
        run: |
          wget https://github.com/SFML/SFML/archive/refs/tags/2.5.1.zip
          unzip 2.5.1.zip
          mv SFML-2.5.1 SFML
          wget https://download.savannah.gnu.org/releases/freetype/freetype-2.13.2.tar.gz
          tar xf freetype-2.13.2.tar.gz

      - name: Build FreeType for arm64-v8a
        run: |
          export NDK=$ANDROID_SDK_ROOT/ndk/25.2.9519653
          mkdir -p freetype-2.13.2/build-arm64
          cd freetype-2.13.2/build-arm64
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -DFT_DISABLE_ZLIB=ON \
            -DFT_DISABLE_BZIP2=ON \
            -DFT_DISABLE_PNG=ON \
            -DFT_DISABLE_HARFBUZZ=ON \
            -DFT_DISABLE_BROTLI=ON \
            -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/freetype-install/arm64-v8a
          make -j$(nproc)
          make install

      - name: Build SFML for arm64-v8a
        run: |
          export NDK=$ANDROID_SDK_ROOT/ndk/25.2.9519653
          mkdir -p SFML/build-arm64
          cd SFML/build-arm64
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSFML_BUILD_AUDIO=OFF \
            -DSFML_BUILD_NETWORK=OFF \
            -DFREETYPE_LIBRARY=$GITHUB_WORKSPACE/freetype-install/arm64-v8a/lib/libfreetype.a \
            -DFREETYPE_INCLUDE_DIRS=$GITHUB_WORKSPACE/freetype-install/arm64-v8a/include/freetype2
          make -j$(nproc)

      - name: Copy SFML libs and headers to app
        run: |
          export NDK=$ANDROID_SDK_ROOT/ndk/25.2.9519653
          mkdir -p app/sfml/arm64-v8a/lib
          mkdir -p app/sfml/arm64-v8a/include
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp SFML/build-arm64/lib/*.so app/sfml/arm64-v8a/lib/
          cp -r SFML/include/SFML app/sfml/arm64-v8a/include/
          cp SFML/build-arm64/lib/*.so app/src/main/jniLibs/arm64-v8a/
          cp $NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so app/src/main/jniLibs/arm64-v8a/

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sfml-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
